name: Deploy Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  pre-deploy-checks:
    name: Pre-deploy validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate all compose files
        run: |
          curl -fsSL https://get.docker.com | sh
          find infrastructure/ -name "docker-compose.yml" | while read -r f; do
            docker compose -f "$f" config -q && echo "OK: $f"
          done

  check-secrets:
    name: Check required secrets
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Verify SERVER_HOST is set
        id: check
        run: |
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SERVER_HOST secret not set - skipping deploy"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks, check-secrets]
    if: needs.check-secrets.outputs.ready == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy infrastructure
        env:
          SERVER: ${{ secrets.DEPLOY_USER }}@${{ secrets.SERVER_HOST }}
          SSH_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no
        run: |
          rsync -az --delete \
            -e "ssh $SSH_OPTS" \
            --exclude '.git' \
            --exclude '.env' \
            --exclude 'users_database.yml' \
            --exclude 'rclone.conf' \
            --exclude 'config.json' \
            --exclude 'acme.json' \
            --exclude 'data/' \
            ./ "$SERVER:/opt/sttraiding/"

          LETSENCRYPT_EMAIL='${{ secrets.LETSENCRYPT_EMAIL }}'
          CF_TOKEN='${{ secrets.CF_DNS_API_TOKEN }}'
          DOMAIN='${{ secrets.DOMAIN }}'
          AUTHELIA_JWT='${{ secrets.AUTHELIA_JWT_SECRET }}'
          AUTHELIA_SESSION='${{ secrets.AUTHELIA_SESSION_SECRET }}'
          AUTHELIA_STORAGE_ENC='${{ secrets.AUTHELIA_STORAGE_ENCRYPTION_KEY }}'
          REDIS_PASS='${{ secrets.REDIS_PASSWORD }}'
          DEEPSEEK_KEY='${{ secrets.DEEPSEEK_API_KEY }}'
          OPENROUTER_KEY='${{ secrets.OPENROUTER_API_KEY }}'
          XRAY_B64='${{ secrets.XRAY_CONFIG_B64 }}'
          RESTIC_PASS='${{ secrets.RESTIC_PASSWORD }}'
          YANDEX_USER='${{ secrets.YANDEX_WEBDAV_USER }}'
          YANDEX_PASS='${{ secrets.YANDEX_WEBDAV_PASS }}'
          TG_TOKEN='${{ secrets.TELEGRAM_BOT_TOKEN }}'
          TG_CHAT='${{ secrets.TELEGRAM_CHAT_ID }}'

          ssh $SSH_OPTS "$SERVER" \
            LETSENCRYPT_EMAIL="$LETSENCRYPT_EMAIL" \
            CF_TOKEN="$CF_TOKEN" \
            DOMAIN="$DOMAIN" \
            AUTHELIA_JWT="$AUTHELIA_JWT" \
            AUTHELIA_SESSION="$AUTHELIA_SESSION" \
            AUTHELIA_STORAGE_ENC="$AUTHELIA_STORAGE_ENC" \
            REDIS_PASS="$REDIS_PASS" \
            DEEPSEEK_KEY="$DEEPSEEK_KEY" \
            OPENROUTER_KEY="$OPENROUTER_KEY" \
            XRAY_B64="$XRAY_B64" \
            RESTIC_PASS="$RESTIC_PASS" \
            YANDEX_USER="$YANDEX_USER" \
            YANDEX_PASS="$YANDEX_PASS" \
            TG_TOKEN="$TG_TOKEN" \
            TG_CHAT="$TG_CHAT" \
            bash -s << 'ENVSSH'
            set -euo pipefail
            cd /opt/sttraiding

            { echo "LETSENCRYPT_EMAIL=$LETSENCRYPT_EMAIL"; echo "DOMAIN=$DOMAIN"; \
              echo "CF_DNS_API_TOKEN=$CF_TOKEN"; } \
              > infrastructure/traefik/.env

            { echo "JWT_SECRET=$AUTHELIA_JWT"; echo "SESSION_SECRET=$AUTHELIA_SESSION"; \
              echo "STORAGE_ENCRYPTION_KEY=$AUTHELIA_STORAGE_ENC"; \
              echo "REDIS_PASSWORD=$REDIS_PASS"; echo "DOMAIN=$DOMAIN"; } \
              > infrastructure/authelia/.env

            echo "DOMAIN=$DOMAIN" > infrastructure/syncthing/.env

            { echo "DOMAIN=$DOMAIN"; echo "OPENROUTER_API_KEY=$OPENROUTER_KEY"; \
              echo "DEEPSEEK_API_KEY=$DEEPSEEK_KEY"; \
              echo "TELEGRAM_BOT_TOKEN=$TG_TOKEN"; \
              echo "TELEGRAM_ALLOWED_USERS=$TG_CHAT"; \
              echo "TELEGRAM_HOME_CHANNEL=$TG_CHAT"; } \
              > infrastructure/hermes/.env

            # Write DeepSeek as default model to hermes-data volume
            HERMES_VOL=$(docker volume inspect hermes-data 2>/dev/null \
              | grep '"Mountpoint"' | awk -F'"' '{print $4}' || echo "")
            if [ -n "$HERMES_VOL" ]; then
              mkdir -p "$HERMES_VOL"
              { echo 'model:'; echo '  default: deepseek-chat'; \
                echo '  provider: deepseek'; \
                echo '  base_url: https://api.deepseek.com'; \
                echo '  model: deepseek-chat'; \
                echo 'providers: {}'; echo 'fallback_providers: []'; \
                echo 'toolsets:'; echo '- hermes-cli'; \
                echo 'agent:'; echo '  max_turns: 60'; \
                echo '  gateway_timeout: 1800'; \
                echo '  restart_drain_timeout: 180'; \
                echo '  api_max_retries: 3'; } \
                > "$HERMES_VOL/config.yaml"
            fi

            echo "DOMAIN=$DOMAIN" > infrastructure/netdata/.env

            printf '%s' "$XRAY_B64" | base64 -d > infrastructure/xray/config.json

            { echo "RESTIC_PASSWORD=$RESTIC_PASS"; echo "YANDEX_USER=$YANDEX_USER"; \
              echo "YANDEX_PASS=$YANDEX_PASS"; echo "TELEGRAM_BOT_TOKEN=$TG_TOKEN"; \
              echo "TELEGRAM_CHAT_ID=$TG_CHAT"; } \
              > infrastructure/backup/.env
          ENVSSH

          ssh $SSH_OPTS "$SERVER" bash << 'DEPLOYSSH'
            set -euo pipefail
            cd /opt/sttraiding

            deploy_service() {
              local svc=$1
              echo "Deploying: $svc"
              docker compose -f "infrastructure/${svc}/docker-compose.yml" \
                pull --ignore-buildable --quiet
              docker compose -f "infrastructure/${svc}/docker-compose.yml" \
                up -d --build --remove-orphans
            }

            git rev-parse HEAD > .last-deploy 2>/dev/null || true

            deploy_service traefik
            sleep 5
            deploy_service authelia
            sleep 5
            deploy_service xray
            deploy_service syncthing
            deploy_service hermes
            deploy_service netdata
            deploy_service backup
          DEPLOYSSH

      - name: Debug hermes
        continue-on-error: true
        env:
          SERVER: ${{ secrets.DEPLOY_USER }}@${{ secrets.SERVER_HOST }}
          SSH_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no
        run: |
          ssh $SSH_OPTS "$SERVER" bash << 'DBGSSH'
            echo "=== hermes container ==="
            docker ps -a --filter label=com.docker.compose.service=hermes || true
            HERMES_ID=$(docker ps -q --filter label=com.docker.compose.service=hermes 2>/dev/null | head -1 || true)
            echo "=== hermes inspect ==="
            if [ -n "$HERMES_ID" ]; then
              docker inspect "$HERMES_ID" 2>/dev/null | grep -E '"IPAddress"|"Networks"|"Name"' | head -20 || true
            fi
            echo "=== traefik-public members ==="
            docker network inspect traefik-public 2>/dev/null | grep '"Name"' | head -20 || true
            echo "=== hermes logs (last 20) ==="
            if [ -n "$HERMES_ID" ]; then
              docker logs "$HERMES_ID" --tail=20 2>&1 || true
            fi
          DBGSSH

      - name: Run smoke tests
        env:
          SERVER: ${{ secrets.DEPLOY_USER }}@${{ secrets.SERVER_HOST }}
          SSH_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no
        run: |
          ssh $SSH_OPTS "$SERVER" \
            DOMAIN="${{ secrets.DOMAIN }}" \
            bash /opt/sttraiding/tests/smoke/smoke_prod.sh

      - name: Notify on success
        if: success()
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="Deploy SUCCESS: $(git log -1 --pretty='%h %s')" || true

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="Deploy FAILED on main. Check Actions log." || true
