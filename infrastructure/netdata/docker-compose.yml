services:
  netdata:
    image: netdata/netdata:v1.47.0
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - TZ=Europe/Moscow
    pid: host
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - netdata-cache:/var/cache/netdata
      - netdata-lib:/var/lib/netdata
    networks:
      - traefik-public
      - internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:19999/api/v1/info"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.netdata.rule=Host(`netdata.${DOMAIN:-sttraiding.ru}`)"
      - "traefik.http.routers.netdata.entrypoints=websecure"
      - "traefik.http.routers.netdata.tls=true"
      - "traefik.http.routers.netdata.tls.certresolver=letsencrypt"
      - "traefik.http.routers.netdata.middlewares=authelia@file,secure-headers@file"
      - "traefik.http.services.netdata.loadbalancer.server.port=19999"

volumes:
  netdata-cache:
    name: netdata-cache
  netdata-lib:
    name: netdata-lib

networks:
  traefik-public:
    external: true
  internal:
    external: true
