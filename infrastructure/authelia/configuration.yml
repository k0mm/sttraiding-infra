---
# Secrets (jwt_secret, session.secret, session.redis.password) are passed
# via AUTHELIA_* environment variables — not stored here.

server:
  host: 0.0.0.0
  port: 9091

log:
  level: info

totp:
  issuer: sttraiding.ru
  period: 30
  skew: 1

authentication_backend:
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2id
      iterations: 3
      memory: 65536
      parallelism: 4
      key_length: 32
      salt_length: 16

access_control:
  default_policy: deny
  rules:
    - domain: "auth.sttraiding.ru"
      policy: bypass
    - domain:
        - "traefik.sttraiding.ru"
        - "syncthing.sttraiding.ru"
        - "netdata.sttraiding.ru"
        - "hermes.sttraiding.ru"
        - "backup.sttraiding.ru"
      policy: two_factor

session:
  name: authelia_session
  domain: sttraiding.ru
  same_site: lax
  expiration: 8h
  inactivity: 2h
  redis:
    host: redis
    port: 6379

regulation:
  max_retries: 5
  find_time: 2m
  ban_time: 10m

storage:
  encryption_key: ${AUTHELIA_STORAGE_ENCRYPTION_KEY}
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notification.txt
