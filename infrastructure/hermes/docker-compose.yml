services:
  hermes:
    image: nousresearch/hermes-agent:main
    restart: unless-stopped
    command: gateway
    env_file:
      - path: .env
        required: false
    environment:
      - HERMES_HOME=/opt/data
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
    volumes:
      - hermes-data:/opt/data
      - obsidian-vault:/vault
    networks:
      - traefik-public
      - internal
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9119/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hermes-dash.rule=Host(`hermes.${DOMAIN:-sttraiding.ru}`)"
      - "traefik.http.routers.hermes-dash.entrypoints=websecure"
      - "traefik.http.routers.hermes-dash.tls=true"
      - "traefik.http.routers.hermes-dash.tls.certresolver=letsencrypt"
      - "traefik.http.routers.hermes-dash.middlewares=authelia@file,secure-headers@file"
      - "traefik.http.routers.hermes-dash.service=hermes-dash"
      - "traefik.http.services.hermes-dash.loadbalancer.server.port=9119"
      - "traefik.http.routers.hermes-api.rule=Host(`hermes-api.${DOMAIN:-sttraiding.ru}`)"
      - "traefik.http.routers.hermes-api.entrypoints=websecure"
      - "traefik.http.routers.hermes-api.tls=true"
      - "traefik.http.routers.hermes-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.hermes-api.middlewares=authelia@file,secure-headers@file"
      - "traefik.http.routers.hermes-api.service=hermes-api"
      - "traefik.http.services.hermes-api.loadbalancer.server.port=8642"

volumes:
  hermes-data:
    name: hermes-data
  obsidian-vault:
    external: true
    name: obsidian-vault

networks:
  traefik-public:
    external: true
  internal:
    external: true
