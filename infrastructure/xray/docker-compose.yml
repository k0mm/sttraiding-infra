services:
  xray:
    image: teddysun/xray:1.8.24
    restart: unless-stopped
    volumes:
      - ./config.json:/etc/xray/config.json:ro
    networks:
      - internal
      - hermes-net
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "xray", "version"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  internal:
    external: true
  hermes-net:
    external: true
