upstream docker_socket {
    server unix:/var/run/docker.sock;
}

server {
    listen 2375;
    access_log off;

    # Rewrite any /vX.Y/ prefix to /v1.47/ so old Docker clients work with Docker 29+
    location ~ ^/v[0-9]+\.[0-9]+/(.*)$ {
        rewrite ^/v[0-9]+\.[0-9]+/(.*)$ /v1.47/$1 break;
        proxy_pass http://docker_socket;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://docker_socket;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}
