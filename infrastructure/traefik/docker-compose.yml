services:
  docker-api-proxy:
    image: nginx:alpine
    restart: unless-stopped
    user: "0:0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./nginx-docker-main.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-docker-proxy.conf:/etc/nginx/conf.d/docker.conf:ro
    networks:
      - internal
    security_opt:
      - no-new-privileges:true

  traefik:
    image: traefik:v3.3
    depends_on:
      - docker-api-proxy
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-}
      - DOMAIN=${DOMAIN:-sttraiding.ru}
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN:-}
    ports:
      - "80:80"
      - "443:443"
    command:
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}"
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - traefik-certs:/etc/traefik/acme
    networks:
      - traefik-public
      - internal
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN:-sttraiding.ru}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls=true"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=authelia@file,secure-headers@file"

volumes:
  traefik-certs:
    name: traefik-certs

networks:
  traefik-public:
    external: true
  internal:
    external: true
